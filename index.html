<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Galaxy Linktree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. PENGATURAN UTAMA & BACKGROUND GALAXY
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #0b0416 60%, #020005 100%);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: galaxyMove 120s linear infinite;
            opacity: 0.8;
            z-index: 0;
        }

        @keyframes galaxyMove {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        .shooting-star {
            position: fixed;
            top: -10%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
            animation: animateStar 5s linear infinite;
            z-index: 0;
            opacity: 0;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 150px;
            height: 1px;
            background: linear-gradient(90deg, #fff, transparent);
        }

        @keyframes animateStar {
            0% { transform: rotate(315deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: rotate(315deg) translateX(-1000px); opacity: 0; }
            100% { transform: rotate(315deg) translateX(-1000px); opacity: 0; }
        }

        /* ==========================================================================
           2. CONTAINER UTAMA (GLASSMORPHISM PREMIUM)
           ========================================================================== */
        .container {
            width: 100%;
            max-width: 430px;
            padding: 35px 25px;
            text-align: center;
            background: rgba(13, 5, 29, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(147, 51, 234, 0.3);
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.2);
            margin: 20px;
            z-index: 1;
            position: relative;
        }

        /* FOTO PROFIL SEJAJAR INDEX.HTML */
        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            padding: 4px;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #9333ea, #f43f5e);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.6);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .profile-img:hover {
            transform: scale(1.08) rotate(5deg);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-top: 15px;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .bio {
            font-size: 13px;
            color: #bbf7d0;
            margin-top: 5px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* ==========================================================================
           3. BUTTON LINKS DENGAN GLOW EFFECT
           ========================================================================== */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .button-link {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 16px 24px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .button-link i {
            font-size: 22px;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        .tiktok:hover {
            background: #000000;
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.7);
            transform: translateY(-3px);
        }

        .whatsapp:hover {
            background: #128C7E;
            border-color: #25D366;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.7);
            transform: translateY(-3px);
        }

        .instagram:hover {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(220, 39, 67, 0.7);
            transform: translateY(-3px);
        }

        .youtube:hover {
            background: #cc181e;
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
            transform: translateY(-3px);
        }

        /* ==========================================================================
           4. TOMBOL CONTROLLER MUSIK
           ========================================================================== */
        .music-control {
            position: fixed;
            top: 25px;
            right: 25px;
            background: rgba(147, 51, 234, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(147, 51, 234, 0.5);
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            color: #ffffff;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.4);
        }

        .music-control:hover {
            transform: scale(1.1) rotate(15deg);
            background: rgba(147, 51, 234, 0.4);
            box-shadow: 0 0 25px rgba(147, 51, 234, 0.7);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="shooting-star"></div>

    <div class="music-control" onclick="toggleMusic()">
        <i id="music-icon" class="fas fa-pause"></i>
    </div>
    
    <audio id="my-audio" autoplay loop>
        <source src="https://files.catbox.moe/s4kj9n.mp3" type="audio/mp3">
    </audio>

    <div class="container">
        
        <img src="foto.jpg" onerror="this.src='foto.jpeg'" alt="Kyy Profile" class="profile-img">
        
        <h1>Kyy'sPrst_</h1>
        <p class="bio">✨ Kyy's baek hobinya ngedit, jangan lupa follow yaa✨</p>

        <div class="links-wrapper">
            
            <a href="https://www.tiktok.com/@kyysprst_" target="_blank" class="button-link tiktok">
                <i class="fab fa-tiktok"></i> TikTok Account
            </a>

            <a href="https://whatsapp.com/channel/0029Vb7pYOZ2f3EN0L01HO05" target="_blank" class="button-link whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp Channel
            </a>

            <a href="https://www.instagram.com/kyysprst_" target="_blank" class="button-link instagram">
                <i class="fab fa-instagram"></i> Instagram Profile
            </a>

            <a href="https://www.youtube.com/@KyysPrst" target="_blank" class="button-link youtube">
                <i class="fab fa-youtube"></i> YouTube Channel
            </a>

        </div>
    </div>

    <script>
        const audio = document.getElementById('my-audio');
        const icon = document.getElementById('music-icon');

        // Memaksa musik langsung berputar otomatis saat halaman dimuat
        window.addEventListener('DOMContentLoaded', () => {
            audio.play().then(() => {
                icon.style.animation = "spin 4s linear infinite";
            }).catch(err => {
                console.log("Autoplay musik terhambat aturan privasi browser bawaan.");
            });
        });

        // Kontrol manual tombol Play / Pause
        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                icon.classList.remove('fa-music');
                icon.classList.add('fa-pause');
                icon.style.animation = "spin 4s linear infinite"; 
            } else {
                audio.pause();
                icon.classList.remove('fa-pause');
                icon.classList.add('fa-music');
                icon.style.animation = "none";
            }
        }
    </script>
</body>
</html>
